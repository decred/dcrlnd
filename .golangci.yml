version: "2"
run:
  timeout: 10m
linters:
  default: none
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - errchkjson
    - govet
    - grouper
    - ineffassign
    - nosprintfhostport
    - reassign
    - rowserrcheck
    - unconvert
    - unused
  exclusions:
    rules:
      - linters:
          - govet
          - unused
        path: lntest/itest/.*
      - path: lntest/
        text: lostcancel
formatters:
  enable:
    - gofmt
